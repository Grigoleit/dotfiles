###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# 0. CHEATSHEET
bind = $mainMod, F1, exec, qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle #"Toggle this window."

# 1. GENERAL
bind = ALT, SPACE, exec, $menu #"Launcher"
bind = ALT, dead_grave, exec, $terminal #"Opens Terminal (Kitty)"
bind = $mainMod, C, killactive, #"Kills active window"
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager #"Opens filemanager (Dolphin)"
bind = $mainMod, V, togglefloating, #"Toogle floating window"
bind = $mainMod, P, pseudo, # "Pseudo Layout"
bind = $mainMod, J, layoutmsg, togglesplit #"Toggle split-layout"
bind = $mainMod, K, layoutmsg, swapsplit #"Swaps the two halves of the split of the current window"
bind = $mainMod, R, layoutmsg, rotatesplit #"Rotates split-layout"


# 2. MOVE FOCUS
bind = $mainMod, left, movefocus, l #"Move left"
bind = $mainMod, right, movefocus, r #"Move right"
bind = $mainMod, up, movefocus, u #"Move up"
bind = $mainMod, down, movefocus, d #"Move down"

# 3. SWITCH WORKSPACES
bind = $mainMod, 1, workspace, 1 #"Workspace 1"
bind = $mainMod, 2, workspace, 2 #"Workspace 2"
bind = $mainMod, 3, workspace, 3 #"Workspace 3"
bind = $mainMod, 4, workspace, 4 #"Workspace 4"
bind = $mainMod, 5, workspace, 5 #"Workspace 5"
bind = $mainMod, 6, workspace, 6 #"Workspace 6"
bind = $mainMod, 7, workspace, 7 #"Workspace 7"
bind = $mainMod, 8, workspace, 8 #"Workspace 8"
bind = $mainMod, 9, workspace, 9 #"Workspace 9"
bind = $mainMod, 0, workspace, 10  #"Workspace 10"

# 3. MOVE WINDOW TO WORKSPACES
bind = $mainMod SHIFT, 1, movetoworkspace, 1 #"Move to workspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2 #"Move to workspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3 #"Move to workspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4 #"Move to workspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5 #"Move to workspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6 #"Move to workspace 6"
bind = $mainMod SHIFT, 7, movetoworkspace, 7 #"Move to workspace 7"
bind = $mainMod SHIFT, 8, movetoworkspace, 8 #"Move to workspace 8"
bind = $mainMod SHIFT, 9, movetoworkspace, 9 #"Move to workspace 9"
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #"Move to workspace 10"

# 4. MOVE WORKSPACE TO MONITOR
bind = $mainMod SHIFT, LEFT, movecurrentworkspacetomonitor, +1 #"Move left"
bind = $mainMod SHIFT, RIGHT, movecurrentworkspacetomonitor, -1 #"Move right"


# 5. FULLSCREEN
bind = $mainMod CTRL, F, fullscreen, 0 #"Normal fullscreen, e.g. for games"
bind = $mainMod , F, fullscreen, 1 #"Maximize windows"
bind = $mainMod SHIFT, F, fullscreenstate, 0 2 #"Fullscreen inside a tile"

# ALT+Tab
bind = ALT, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

# 6. SCRATCHPAD
bind = $mainMod, S, togglespecialworkspace, magic #"Toggle scratchpad"
bind = $mainMod SHIFT, S, movetoworkspace, special:magic #"Move active window to scratchpad"

# 8. MOUSE SETTINGS
bindm = $mainMod, mouse:272, movewindow #"Move window"
bindm = $mainMod, mouse:273, resizewindow #"Resize window"
bind = $mainMod, mouse_down, workspace, e+1 #"Next workspace"
bind = $mainMod, mouse_up, workspace, e-1 #"Previous workspace"

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Discord
bind = , mouse:278, pass, class:^(discord)$
bind = , mouse:277, pass, class:^(discord)$

# Lock Screen
bind = $mainMod, L, exec, $lockscreen

# 9. SCREENSHOT
bind = CTRL SHIFT, 4, exec, hyprcap shot region -c -w  #"Region Capture"
bind = , Print, exec, hyprcap shot region -c -w #"Region Capture"
